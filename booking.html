<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa Jet Ski Rental</title>
    <link rel="stylesheet" href="css/style.css">
  
</head>
<body>
     <header class="navbar">
    <div class="container nav-content">
      <img src="images/logo.png" alt="Papa Jet Ski Rentals" class="logo">
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <section class="booking section">
    <div class="container booking-grid">
      <div class="booking-form-box">
        <h2>Book Your Jet Ski</h2>
        <form id="bookingForm">
          <label for="name">Full Name</label>
          <input type="text" id="name" required />

          <label for="email">Email</label>
          <input type="email" id="email" required />

          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" required />

          <label for="date">Rental Date</label>
          <input type="date" id="date" required />

          <label for="time">Rental Time</label>
          <input type="time" id="time" required />

          <label for="package">Select Package</label>
          <select id="package" required>
            <option value="95" data-name="1 Hour Rental">1 Hour Rental - $95</option>
            <option value="190" data-name="2 Hour Rental">2 Hour Rental - $190</option>
            <option value="285" data-name="3 Hour Rental">3 Hour Rental - $285</option>
          </select>

          <label for="skis">Number of Jet Skis</label>
          <select id="skis" required>
            <option value="1">1 Jet Ski</option>
            <option value="2">2 Jet Skis</option>
            <option value="3">3 Jet Skis</option>
            <option value="4">4 Jet Skis</option>
          </select>

          <div class="summary">
            <h3>Booking Summary</h3>
            <p>Package: <span id="summaryPackage">1 Hour Rental</span></p>
            <p>Jet Skis: <span id="summarySkis">1</span></p>
            <p>Discount: $<span id="discountAmount">0.00</span></p>
            <p>Total: $<span id="totalPrice">100.23</span></p>
          </div>

          <div class="discount-section">
            <label for="discountCode">Discount Code (Optional)</label>
            <input type="text" id="discountCode" placeholder="Enter discount code" />
            <button type="button" id="applyDiscount" class="btn btn-secondary">Apply Code</button>
            <p id="discountMessage" class="discount-message"></p>
          </div>

          <h3>Payment Details</h3>
          <label for="cardName">Name on Card</label>
          <input type="text" id="cardName" placeholder="Papa Dawda" required />

          <label for="cardNumber">Card Number</label>
          <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" required />

          <div class="payment-row">
            <div>
              <label for="expiry">Expiry Date</label>
              <input type="text" id="expiry" placeholder="MM/YY" required />
            </div>
            <div>
              <label for="cvv">CVV</label>
              <input type="text" id="cvv" placeholder="123" required />
            </div>
          </div>

          <button type="submit" class="btn">Book & Pay</button>
        </form>

        <p id="confirmationMessage" class="confirmation-message"></p>
      </div>
    </div>
  </section>



  <footer>
  <div class="container">
    <p>2026 Papa Jet Ski Rentals.</p>
    <div class="footer-links">
      <a href="#">📘 Facebook</a>
      <a href="#">📸 Instagram</a>
      <a href="#">📍 Location</a>
    </div>
  </div>
  </footer>

  <script src="javascript/script.js"></script>
</body>
</html>
